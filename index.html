<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pengumuman Kelulusan</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Poppins',sans-serif;
    min-height:100vh;
    background:#3a7a45;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.laptop{
    width:900px;
    max-width:100%;
}

.screen{
    background:#2d0452;
    border:16px solid #1b1b1b;
    border-bottom:0;
    border-radius:20px 20px 0 0;
    min-height:520px;
    position:relative;
    overflow:hidden;
    padding:35px;
}

.camera{
    width:10px;
    height:10px;
    background:#ddd;
    border-radius:50%;
    position:absolute;
    top:8px;
    left:50%;
    transform:translateX(-50%);
}

.base{
    height:30px;
    background:#111;
    border-radius:0 0 20px 20px;
    position:relative;
}

.base::before{
    content:'';
    width:140px;
    height:8px;
    background:#f2f2f2;
    border-radius:0 0 10px 10px;
    position:absolute;
    top:0;
    left:50%;
    transform:translateX(-50%);
}

.base::after{
    content:'';
    width:60px;
    height:10px;
    background:#ddd;
    border-radius:8px;
    position:absolute;
    left:20px;
    top:10px;
}

.dots{
    position:absolute;
    right:20px;
    top:10px;
    display:flex;
    gap:8px;
}

.dots span{
    width:12px;
    height:12px;
    border-radius:50%;
    background:#ddd;
}

.topbar{
    position:absolute;
    top:12px;
    right:20px;
    color:#fff;
    font-size:12px;
}

.content{
    text-align:center;
    color:white;
    margin-top:70px;
    position:relative;
    z-index:2;
}

.logo{
    width:85px;

    border-radius:80%;
    margin:auto;
    overflow:hidden;

}

.logo img{
    width:100%;
    height:100%;
    object-fit:cover;
    
}

h1{
    margin-top:28px;
    font-size:42px;
    font-weight:700;
    letter-spacing:1px;
}

.school{
    margin-top:12px;
    font-size:20px;
    font-weight:600;
}

.year{
    font-size:18px;
    margin-top:4px;
}

.info{
    color:#39ff70;
    margin-top:22px;
    font-size:15px;
    font-weight:500;
}

.form-box{
    margin-top:25px;
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
    gap:0;
}

.form-box input{
    width:360px;
    max-width:100%;
    padding:16px;
    border:none;
    outline:none;
    font-size:15px;
    background:#fff;
}

.form-box button{
    padding:16px 28px;
    border:none;
    background:#7a1fa2;
    color:#fff;
    font-weight:600;
    cursor:pointer;
    transition:.3s;
}

.form-box button:hover{
    background:#9c27b0;
}

.mountain1,
.mountain2,
.sun{
    position:absolute;
}

.mountain1{
    bottom:0;
    left:0;
    width:320px;
    height:140px;
    background:#5b187e;
    clip-path:polygon(0 100%,0 70%,18% 45%,30% 60%,42% 30%,58% 65%,72% 45%,100% 100%);
}

.mountain2{
    bottom:0;
    right:0;
    width:420px;
    height:170px;
    background:#421060;
    clip-path:polygon(0 100%,0 60%,20% 30%,40% 55%,55% 20%,75% 50%,100% 100%);
}

.sun{
    width:160px;
    height:160px;
    border-radius:50%;
    background:rgba(255,255,255,.08);
    bottom:-45px;
    left:50%;
    transform:translateX(-50%);
}

@media(max-width:768px){
    h1{font-size:28px;}
    .school{font-size:16px;}
    .year{font-size:14px;}
    .form-box{
        flex-direction:column;
        align-items:center;
        gap:10px;
    }
    .form-box input,
    .form-box button{
        width:100%;
        max-width:360px;
    }
}
@keyframes muncul{
    from{
        opacity:0;
        transform:translateY(30px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

.boxTime{
    min-width:95px;
    background:rgba(255,255,255,0.12);
    padding:16px;
    border-radius:18px;
    text-align:center;
    transition:.3s;
    box-shadow:0 10px 25px rgba(0,0,0,.2);
}

.boxTime span{
    display:block;
    font-size:34px;
    font-weight:700;
    color:#fff;
}

.boxTime small{
    font-size:13px;
    color:#ddd;
}

.getar{
    animation:getar .15s infinite;
}

@keyframes getar{
    0%{transform:translate(1px,1px);}
    25%{transform:translate(-1px,2px);}
    50%{transform:translate(-2px,-1px);}
    75%{transform:translate(2px,1px);}
    100%{transform:translate(1px,-1px);}
}

.flash{
    animation:flash .5s infinite;
}

@keyframes flash{
    0%{opacity:1;}
    50%{opacity:.4;}
    100%{opacity:1;}
}

@keyframes ledak{
    from{
        transform:scale(.3);
        opacity:0;
    }
    to{
        transform:scale(1);
        opacity:1;
    }
}
.unlockGlow{
    animation:unlockGlow 1s infinite alternate;
}

@keyframes unlockGlow{
    from{
        box-shadow:0 0 10px rgba(0,255,100,.3);
        transform:scale(1);
    }
    to{
        box-shadow:0 0 25px rgba(0,255,100,.8);
        transform:scale(1.05);
    }
}

@keyframes fadeUnlock{
    from{
        opacity:0;
        transform:scale(.9);
    }
    to{
        opacity:1;
        transform:scale(1);
    }
}

.ledakGetar{
    animation:ledakGetar .08s infinite;
}

@keyframes ledakGetar{

    0%{transform:translate(2px,1px);}
    25%{transform:translate(-2px,-1px);}
    50%{transform:translate(3px,-2px);}
    75%{transform:translate(-3px,2px);}
    100%{transform:translate(1px,-1px);}
}
</style>

function aktifkanAudio(){

    if(!audioCtx){
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }

    if(audioCtx.state === "suspended"){
        audioCtx.resume();
    }

}
function beep(){

    aktifkanAudio();

    let ctx = audioCtx;
    let osc = ctx.createOscillator();
    let gain = ctx.createGain();

    osc.connect(gain);
    gain.connect(ctx.destination);

    osc.frequency.value = 800;
    osc.type = "square";

    gain.gain.setValueAtTime(0.08, ctx.currentTime);

    osc.start();
    osc.stop(ctx.currentTime + 0.08);
}

function suaraLedakan(){

    let ctx = new (window.AudioContext || window.webkitAudioContext)();
    let now = ctx.currentTime;

    // ==========================
    // DENTUMAN BESAR
    // ==========================
    let osc1 = ctx.createOscillator();
    let gain1 = ctx.createGain();

    osc1.type = "sawtooth";
    osc1.frequency.setValueAtTime(260, now);
    osc1.frequency.exponentialRampToValueAtTime(25, now + 1);

    gain1.gain.setValueAtTime(1.4, now);
    gain1.gain.exponentialRampToValueAtTime(0.001, now + 1);

    osc1.connect(gain1);
    gain1.connect(ctx.destination);

    osc1.start(now);
    osc1.stop(now + 1);


    // ==========================
    // BASS
    // ==========================
    let osc2 = ctx.createOscillator();
    let gain2 = ctx.createGain();

    osc2.type = "triangle";
    osc2.frequency.setValueAtTime(55, now);

    gain2.gain.setValueAtTime(1.2, now);
    gain2.gain.exponentialRampToValueAtTime(0.001, now + 1.4);

    osc2.connect(gain2);
    gain2.connect(ctx.destination);

    osc2.start(now);
    osc2.stop(now + 1.4);


    // ==========================
    // GETAR LAYAR
    // ==========================
    document.querySelector(".screen").classList.add("ledakGetar");


    // ==========================
    // FLASH PUTIH
    // ==========================
    let flash = document.createElement("div");

    flash.style.position = "fixed";
    flash.style.top = "0";
    flash.style.left = "0";
    flash.style.width = "100%";
    flash.style.height = "100%";
    flash.style.background = "#fff";
    flash.style.opacity = "1";
    flash.style.zIndex = "999999";

    document.body.appendChild(flash);

    setTimeout(()=>{
        flash.style.transition = ".5s";
        flash.style.opacity = "0";
    },50);

    setTimeout(()=>{
        flash.remove();
    },700);


    // ==========================
    // ASAP
    // ==========================
    for(let i=0;i<20;i++){

        let smoke = document.createElement("div");

        smoke.style.position = "fixed";
        smoke.style.width = "70px";
        smoke.style.height = "70px";
        smoke.style.borderRadius = "50%";
        smoke.style.background = "rgba(180,180,180,.35)";
        smoke.style.left = (45 + Math.random()*10) + "%";
        smoke.style.top = "55%";
        smoke.style.zIndex = "99999";
        smoke.style.filter = "blur(10px)";
        smoke.style.transition = "2.5s ease-out";

        document.body.appendChild(smoke);

        setTimeout(()=>{
            smoke.style.transform =
            `translate(${(Math.random()*200)-100}px,-250px) scale(2.5)`;
            smoke.style.opacity = "0";
        },50);

        setTimeout(()=>{
            smoke.remove();
        },2600);
    }


    // ==========================
    // CONFETTI BESAR
    // ==========================
    for(let i=0;i<150;i++){

        let c = document.createElement("div");

        c.style.position = "fixed";
        c.style.width = "10px";
        c.style.height = "10px";
        c.style.left = Math.random()*100 + "%";
        c.style.top = "-20px";
        c.style.borderRadius = "50%";
        c.style.background =
        `hsl(${Math.random()*360},100%,50%)`;

        c.style.zIndex = "999999";
        c.style.transition = "4s linear";

        document.body.appendChild(c);

        setTimeout(()=>{
            c.style.top = "105%";
            c.style.transform = "rotate(720deg)";
        },50);

        setTimeout(()=>{
            c.remove();
        },4200);
    }


    // ==========================
    // HAPUS GETAR
    // ==========================
    setTimeout(()=>{
        document.querySelector(".screen").classList.remove("ledakGetar");
    },1000);

}
